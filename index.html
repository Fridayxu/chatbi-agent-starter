<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatBI - AI Supply Chain Analyst</title>
  <style>
    :root {
      --bg: #0d1117; --bg-card: #161b22; --border: #30363d;
      --text: #e6edf3; --text-dim: #8b949e; --accent: #58a6ff;
      --accent-dim: rgba(88,166,255,0.1); --red: #f85149; --radius: 8px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
    #root { flex: 1; display: flex; flex-direction: column; max-width: 900px; margin: 0 auto; width: 100%; padding: 0 16px; }
    header { text-align: center; padding: 24px 0 12px; border-bottom: 1px solid var(--border); }
    header h1 { font-size: 1.4rem; font-weight: 700; }
    header p { color: var(--text-dim); font-size: 0.85rem; margin-top: 4px; }
    #messages { flex: 1; overflow-y: auto; padding: 16px 0; display: flex; flex-direction: column; gap: 12px; }
    .msg { max-width: 85%; padding: 10px 14px; border-radius: var(--radius); line-height: 1.6; font-size: 0.9rem; word-wrap: break-word; }
    .msg.user { align-self: flex-end; background: var(--accent-dim); border: 1px solid rgba(88,166,255,0.2); }
    .msg.assistant { align-self: flex-start; background: var(--bg-card); border: 1px solid var(--border); }
    .msg pre { background: #0d1117; border: 1px solid var(--border); border-radius: 6px; padding: 10px; overflow-x: auto; font-size: 0.82rem; margin: 8px 0; }
    .msg code { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.82rem; }
    .msg p { margin: 4px 0; }
    #input-area { padding: 12px 0 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: flex-end; }
    #input-area textarea { flex: 1; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); padding: 10px 14px; font-size: 0.9rem; resize: none; outline: none; min-height: 44px; max-height: 120px; font-family: inherit; }
    #input-area textarea:focus { border-color: var(--accent); }
    #input-area button { padding: 10px 16px; border: none; border-radius: var(--radius); cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: all 0.15s; }
    #send-btn { background: var(--accent); color: #fff; }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #stop-btn { background: var(--red); color: #fff; display: none; }
    #file-btn { background: var(--bg-card); color: var(--text-dim); border: 1px solid var(--border) !important; font-size: 1.2rem; padding: 8px 12px; }
    #file-btn:hover { color: var(--accent); border-color: var(--accent) !important; }
    .file-tag { display: inline-flex; align-items: center; gap: 4px; background: var(--accent-dim); color: var(--accent); padding: 2px 10px; border-radius: 12px; font-size: 0.75rem; margin: 2px; }
    .file-tag button { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 0.8rem; padding: 0; }
    .empty { text-align: center; color: var(--text-dim); padding: 40px 20px; }
    .empty h2 { font-size: 1.2rem; margin-bottom: 8px; color: var(--text); }
    .tool-badge { display: inline-block; background: rgba(88,166,255,0.08); color: var(--accent); font-size: 0.7rem; padding: 2px 8px; border-radius: 4px; margin: 4px 2px; }
    .loading { animation: pulse 1.2s infinite; } @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  </style>
</head>
<body>
<div id="root"></div>
<script type="module">
import { createElement as h, useState, useRef, useEffect, useCallback } from 'react'
import { createRoot } from 'react-dom/client'
import ReactMarkdown from 'react-markdown'
import remarkGfm from 'remark-gfm'

const STORAGE_KEY = 'chatbi_conv_id'

function App() {
  const [messages, setMessages] = useState([])
  const [input, setInput] = useState('')
  const [loading, setLoading] = useState(false)
  const [files, setFiles] = useState([])
  const [convId] = useState(() => localStorage.getItem(STORAGE_KEY) || crypto.randomUUID())
  const msgsRef = useRef(null)
  const ctrlRef = useRef(null)
  const botIdRef = useRef('')

  useEffect(() => { localStorage.setItem(STORAGE_KEY, convId) }, [convId])
  useEffect(() => { msgsRef.current?.scrollTo(0, msgsRef.current.scrollHeight) }, [messages])

  const addMsg = useCallback((role, content) => {
    const id = crypto.randomUUID()
    setMessages(prev => [...prev, { id, role, content, streaming: role === 'assistant' }])
    return id
  }, [])

  const updateLast = useCallback((content) => {
    setMessages(prev => { const next = [...prev]; if (next.length) next[next.length - 1] = { ...next[next.length - 1], content, streaming: true }; return next })
  }, [])

  const finishLast = useCallback(() => {
    setMessages(prev => { const next = [...prev]; if (next.length) next[next.length - 1] = { ...next[next.length - 1], streaming: false }; return next })
  }, [])

  const handleSend = async () => {
    const text = input.trim()
    if ((!text && !files.length) || loading) return
    setInput('')
    const currentFiles = [...files]
    setFiles([])

    let display = text
    if (currentFiles.length) {
      const names = currentFiles.map(f => '📄 ' + f.name).join(', ')
      display = text ? names + '\n' + text : names
    }
    addMsg('user', display)
    botIdRef.current = addMsg('assistant', '')
    setLoading(true)

    ctrlRef.current = new AbortController()
    try {
      const payload = { message: text, files: currentFiles.map(f => ({ name: f.name, content: f.content, mimeType: f.mimeType || 'text/csv' })) }
      const qs = window.location.search || ''
      const res = await fetch('/chat' + qs, {
        method: 'POST', headers: { 'Content-Type': 'application/json', 'makers-conversation-id': convId },
        body: JSON.stringify(payload), signal: ctrlRef.current.signal
      })
      const reader = res.body.getReader(), decoder = new TextDecoder()
      let buffer = '', text2 = ''
      while (true) {
        const { done, value } = await reader.read()
        if (done) break
        buffer += decoder.decode(value, { stream: true })
        const parts = buffer.split('\n\n'); buffer = parts.pop() || ''
        for (const part of parts) {
          for (const line of part.split('\n')) {
            if (line.startsWith('data: ')) {
              const d = line.slice(6)
              if (d === '[DONE]') { finishLast(); break }
              try {
                const j = JSON.parse(d)
                if (j.type === 'ai_response' && j.content) { text2 += j.content; updateLast(text2) }
                else if (j.type === 'error_message') { updateLast(text2 + '\n\n⚠️ ' + j.content); finishLast() }
              } catch {}
            }
          }
        }
      }
    } catch (e) {
      if (e.name !== 'AbortError') updateLast('⚠️ ' + (e.message || 'Request failed'))
      finishLast()
    }
    setLoading(false); ctrlRef.current = null
  }

  const handleStop = () => { ctrlRef.current?.abort(); setLoading(false); finishLast() }

  const handleFile = (e) => {
    for (const file of e.target.files || []) {
      const reader = new FileReader()
      reader.onload = () => setFiles(prev => [...prev, { name: file.name, content: reader.result.split(',')[1], mimeType: file.type }])
      reader.readAsDataURL(file)
    }
    e.target.value = ''
  }

  const handleKey = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend() } }

  return h('div', { style: { flex: 1, display: 'flex', flexDirection: 'column', maxWidth: 900, margin: '0 auto', width: '100%', padding: '0 16px' } },
    h('header', null, h('h1', null, '📊 ChatBI Agent'), h('p', null, 'AI Supply Chain Analyst · EDA · Forecast · Inventory · Pricing')),
    h('div', { ref: msgsRef, style: { flex: 1, overflowY: 'auto', padding: '16px 0', display: 'flex', flexDirection: 'column', gap: 12 } },
      messages.length === 0 && h('div', { className: 'empty' },
        h('h2', null, 'Welcome to ChatBI'),
        h('p', null, 'Upload a CSV/Excel file to start analysis, or ask a supply chain question.'),
        h('p', { style: { fontSize: '0.8rem', marginTop: 12 } }, '📊 EDA  🔮 Forecasting  📦 ABC/XYZ  📉 Inventory  💰 Pricing  📄 File Upload')
      ),
      messages.map(m => h('div', { key: m.id, className: `msg ${m.role}` + (m.streaming ? ' loading' : '') },
        h(ReactMarkdown, { remarkPlugins: [remarkGfm] }, m.content || (m.streaming ? '●' : ''))
      ))
    ),
    files.length > 0 && h('div', { style: { display: 'flex', gap: 4, flexWrap: 'wrap', padding: '4px 0' } },
      files.map((f, i) => h('span', { key: i, className: 'file-tag' }, '📄 ' + f.name, h('button', { onClick: () => setFiles(prev => prev.filter((_, j) => j !== i)) }, '✕')))
    ),
    h('div', { style: { padding: '12px 0 20px', borderTop: '1px solid var(--border)', display: 'flex', gap: 8, alignItems: 'flex-end' } },
      h('button', { id: 'file-btn', onClick: () => document.getElementById('file-input').click(), title: 'Upload file' }, '📄'),
      h('input', { id: 'file-input', type: 'file', accept: '.csv,.xlsx,.xls,.json,.txt', multiple: true, onChange: handleFile, style: { display: 'none' } }),
      h('textarea', { value: input, onChange: e => setInput(e.target.value), onKeyDown: handleKey, placeholder: 'Ask about your supply chain data... ⏎ Send', rows: 1, disabled: loading }),
      h('button', { id: 'send-btn', onClick: handleSend, disabled: (!input.trim() && !files.length) || loading }, 'Send'),
      loading && h('button', { id: 'stop-btn', style: { display: 'inline' }, onClick: handleStop }, 'Stop')
    )
  )
}

createRoot(document.getElementById('root')).render(h(App))
</script>
</body>
</html>
